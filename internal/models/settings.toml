# Per-model settings for Marshal
# These settings override defaults and inform FormatFor() selection.
# context_window is in tokens (input + output combined).

[models.gpt-4o]
name = "GPT-4o"
supports_tools = true
supports_vision = true
edit_format = "wholefile"
max_tokens = 4096
context_window = 128000

[models.gpt-4o-mini]
name = "GPT-4o Mini"
supports_tools = true
edit_format = "search-replace"
max_tokens = 4096
context_window = 128000

[models.claude-3-5-sonnet]
name = "Claude 3.5 Sonnet"
supports_tools = true
supports_vision = true
edit_format = "wholefile"
max_tokens = 8192
context_window = 200000

[models.claude-3-opus]
name = "Claude 3 Opus"
supports_tools = true
supports_vision = true
edit_format = "wholefile"
max_tokens = 4096
context_window = 200000

[models.qwen3-coder]
name = "Qwen3 Coder"
supports_tools = true
edit_format = "search-replace"
max_tokens = 4096
context_window = 32768

[models.deepseek-coder]
name = "DeepSeek Coder"
supports_tools = false
edit_format = "search-replace"
max_tokens = 4096
context_window = 16384

[models.llama-3.1-405b]
name = "Llama 3.1 405B"
supports_tools = false
edit_format = "wholefile"
max_tokens = 4096
context_window = 128000

# Ollama / local models (wildcard matching)
# Conservative 8K window — override in user settings for larger local models.
[models.ollama]
pattern = "ollama/*"
supports_tools = false
edit_format = "search-replace"
max_tokens = 4096
context_window = 8192

# llama.cpp server (local) — tool-use disabled by default, weak models often loop
[models.llama_cpp]
pattern = "*/llama.cpp/*"
supports_tools = false
edit_format = "search-replace"
max_tokens = 4096
context_window = 8192

# LM Studio local server — tool-use disabled by default
[models.lmstudio]
pattern = "*/lmstudio/*"
supports_tools = false
edit_format = "search-replace"
max_tokens = 4096
context_window = 8192

# vLLM local server — may support tools but conservative default
[models.vllm]
pattern = "*/vllm/*"
supports_tools = false
edit_format = "search-replace"
max_tokens = 4096
context_window = 16384
