[marshal]
# Qwen3 8B — serverless, hybrid thinking, conversational orchestrator
model       = "accounts/fireworks/models/qwen3-8b"
base_url    = "https://api.fireworks.ai/inference/v1"
api_key     = "${FIREWORKS_API_KEY}"
temperature = 0.6
max_tokens  = 2048

[orchestrator]
# Autonomous orchestrator behavior
mode = "autonomous"           # "autonomous" or "interactive" — default: autonomous
max_exploration_steps = 10     # Max steps when exploring codebase (default: 10)
auto_confirm_complex = true   # Auto-execute complex tasks without confirmation (default: true)
ask_before_destructive = true  # Always ask before destructive operations (default: true)
min_confidence = 0.6           # Threshold for exploring vs asking questions (default: 0.6)

[executor]
# Qwen3 Coder 480B A35B — serverless, agentic coding, RL-trained on SWE-Bench
model       = "accounts/fireworks/models/qwen3-coder-480b-a35b-instruct"
base_url    = "https://api.fireworks.ai/inference/v1"
api_key     = "${FIREWORKS_API_KEY}"
temperature = 0.2
max_tokens  = 4096
# Enable autonomous tool use: read_file, write_file, edit_file, search_code, list_directory, run_command
# enable_tools = false
# max_tool_calls = 20  # per execution round (default 20)

# --- Extended Provider Examples (M13) ---
