[executor]
model       = "accounts/alecpullen/deployments/wo3c63tl"
base_url    = "https://api.fireworks.ai/inference/v1"
api_key     = "${FIREWORKS_API_KEY}"
temperature = 0.2
max_tokens  = 4096

[critic]
# DeepSeek-R1-0528 — full reasoning model, system prompt supported
model       = "accounts/alecpullen/deployments/q9utj0dg"
base_url    = "https://api.fireworks.ai/inference/v1"
api_key     = "${FIREWORKS_API_KEY}"
temperature = 0.6   # R1 series: must be 0.5-0.7
max_tokens  = 8192  # headroom for think-blocks before the verdict
json_output = true

[loop]
max_rounds        = 3
auto_commit       = true
auto_revert       = true
branch_isolation  = true
compact_after     = 2
token_budget_warn = 0.80

[session]
db_path = ".marshal/sessions.db"

[retry]
max_attempts       = 3
initial_backoff_ms = 1000
backoff_factor     = 2.0
retry_status_codes = [429, 502, 503]