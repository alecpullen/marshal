# temperature = 0.2
# max_tokens = 4096

[critic]
# DeepSeek R1-0528 — serverless, full 671B reasoning, system prompt supported
model       = "accounts/fireworks/models/deepseek-r1-0528"
base_url    = "https://api.fireworks.ai/inference/v1"
api_key     = "${FIREWORKS_API_KEY}"
temperature = 0.6
max_tokens  = 8192
json_output = true

[planner]
model       = "accounts/fireworks/models/deepseek-v3p2"
base_url    = "https://api.fireworks.ai/inference/v1"
api_key     = "${FIREWORKS_API_KEY}"
temperature = 0.0
max_tokens  = 2048

[integration_critic]
model       = "accounts/fireworks/models/deepseek-r1-0528"
base_url    = "https://api.fireworks.ai/inference/v1"
api_key     = "${FIREWORKS_API_KEY}"
temperature = 0.6
max_tokens  = 8192

[loop]
max_rounds        = 3
auto_commit       = false   # manual review for local testing
auto_revert       = true
branch_isolation  = true
compact_after     = 2

[session]
db_path = ".marshal/sessions.db"

[retry]
max_attempts       = 3
initial_backoff_ms = 1000
backoff_factor     = 2.0
retry_status_codes = [429, 502, 503]

[ui]
# Editor to open when pressing enter on a file in the explorer.
# Falls back to $EDITOR, then vim.
editor = "vim"
